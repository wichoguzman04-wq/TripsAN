<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Roles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Listado de Roles</h3>
        </div>
        <div class="card-body">
            <table class="table table-hover table-striped table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Fecha Creación</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="rol : ${roles}">
                        <td th:text="${rol.id}"></td>
                        <td th:text="${rol.nombre}"></td>
                        <td th:text="${rol.descripcion}"></td>
                        <td th:text="${rol.fechaCreacion}"></td>
                        <td>
                            <span th:if="${rol.estado == true}" class="badge bg-success">ACTIVO</span>
                            <span th:unless="${rol.estado == true}" class="badge bg-danger">INACTIVO</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
