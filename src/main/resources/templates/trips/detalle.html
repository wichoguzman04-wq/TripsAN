<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="icon" href="favicon.ico">

    <title>TripApp | Aplicación para publicar Ofertas de Vacil en El Salvador.</title>
    <link th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/bootstrap/css/jumbotron.css}" rel="stylesheet">
    <link th:href="@{/bootstrap/css/sticky-footer-navbar.css}" rel="stylesheet">
  </head>

  <body>

    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <main role="main">
      <hr>
      <div class="container" style="padding-top: 4.5rem;"> 

        <div class="row">
          <div class="col-md-3">            
            <img class="rounded mx-auto d-block" th:src="@{/images/{img} (img=${trip?.imagen != null && trip?.imagen != '' ? trip.imagen : 'no-image.png'})}" alt="Generic placeholder image" width="220" height="220">
          </div>
          <div class="col-md-9">
            <div class="card">
              <h4 class="card-header">Trip: <strong th:text="${trip?.nomTrip}">Nombre del viaje</strong></h4>
              <div class="card-body">
                <h5 class="card-title"><strong>Categoría: </strong> <span>Aventura</span></h5>
                <h6 class="card-title"><strong>Publicado: </strong> <span th:text="${trip?.fecha != null ? #dates.format(trip.fecha, 'dd-MM-yyyy') : 'Sin fecha'}">01-01-2022</span></h6>
                <h6 class="card-title"><strong>Costo: </strong> <span th:text="${'$' + trip?.costo}">$0.00</span></h6>
                <p class="card-text" th:text="${trip?.descripcion}">Descripción...</p>
                
                <div class="card bg-light mb-3" >
                  <div class="card-body">
                    <h5 class="card-title">Detalles del Trip</h5>
                    <p class="card-text" th:text="${trip?.descripcion}">Descripción...</p>
                  </div>
                </div>   
                <a class="btn btn-primary" th:href="@{/categorias/create}" role="button" title="Quiero comprar este Trip.">
                  <i class="fas fa-file" aria-hidden="true"></i> Comprar
                </a>                            
              </div>
            </div>  
          </div>
        </div>

      </div>
    </main>

    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script th:src="@{/bootstrap/js/bootstrap.min.js}"></script>
  </body>
</html>
