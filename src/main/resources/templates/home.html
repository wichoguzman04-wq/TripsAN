<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>TripApp | Aplicación para publicar Ofertas de Vacil en El Salvador.</title>
    
    <link th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/bootstrap/css/jumbotron.css}" rel="stylesheet">
    <link th:href="@{/bootstrap/css/sticky-footer-navbar.css}" rel="stylesheet">
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            padding-top: 5.5rem; 
        }
        main {
            flex: 1 0 auto;
        }
        footer {
            flex-shrink: 0;
            width: 100% !important;
        }
    </style>
</head>

<body>

    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <main role="main">

        <div class="jumbotron">
            <div class="container">
                <h3 class="mt-5">Encuentra los mejores Trips en El Salvador.</h3>
                Puedes buscar por descripción y categoría.
                <form class="form-inline">
                    <input type="text" class="form-control mb-3"
                        id="exampleFormControlInput1" placeholder="Escriba una búsqueda">&nbsp;
                    <select class="custom-select custom-select mb-3">
                        <option selected>Seleccione una categoría</option>
                        <option value="1">En la montaña</option>
                        <option value="2">En la Ciudad</option>
                        <option value="3">En los pueblos</option>
                        <option value="4">En las playas</option>
                    </select>&nbsp;
                    <button type="submit" class="btn btn-primary mb-3">Buscar</button>
                </form>
            </div>
        </div>
        <hr>

        <div class="container">
            <h2 class="font-weight-bold text-center text-capitalize">DESTACADOS</h2>
            <hr>

            <div class="row" th:each="trip : ${trips}">
                <div class="col-md-3">
                    <img class="rounded mx-auto d-block"
                        th:src="@{/images/{img} (img=${trip?.imagen != null && trip?.imagen != '' ? trip.imagen : 'no-image.png'})}"
                        alt="Trip Image" width="220" height="220">
                </div>
                <div class="col-md-9">
                    <h2 th:text="${trip?.nomTrip}">Nombre del Trip</h2>

                    <h6 class="card-title">
                        <strong>Categoría: </strong> <span>Aventura</span>
                    </h6>

                    <h6 class="card-title">
                        <strong>Publicado: </strong> <span
                            th:text="${trip?.fecha != null ? #dates.format(trip.fecha, 'dd-MM-yyyy') : 'Sin fecha'}">01-01-2022</span>
                    </h6>

                    <p th:text="${trip?.descripcion}">Descripción detallada del viaje...</p>

                    <p>
                        <a class="btn btn-secondary"
                            th:href="@{/trips/view/{id} (id=${trip?.id})}" role="button">Ver detalles &raquo;</a>
                    </p>
                </div>
                <hr class="col-12">
            </div>
        </div>
    </main>

    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script th:src="@{/bootstrap/js/bootstrap.min.js}"></script>
</body>
</html>
