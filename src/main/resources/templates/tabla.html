<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trips El Salvador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h1 class="h3 mb-0">Trips en El Salvador</h1>
            </div>
            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Fecha publicación</th>
                            <th>Costo</th>
                            <th>Descripción</th>
                            <th>Destacado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="trip : ${trips}">
                            <td th:text="${trip.id}"></td>
                            <td th:text="${trip.nomTrip}"></td>
                            <td th:text="${#dates.format(trip.fecha, 'dd-MM-yyyy')}"></td>
                            <td th:text="${'$' + trip.costo}"></td>
                            <td th:text="${trip.descripcion}"></td>
                            <td>
                                <span th:if="${trip.destacado == 1}" class="badge bg-success text-uppercase p-2">Si</span>
                                <span th:unless="${trip.destacado == 1}" class="badge bg-danger text-uppercase p-2">No</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
