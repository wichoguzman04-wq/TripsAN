<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trips El Salvador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
	<img alt="logo" th:src="@{/images/logo.png}" width="136" height="136"> 
    <h1>Trips en El Salvador</h1>
    <table class="table table-hover align-middle">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Fecha publicación</th>
                            <th>Costo</th>
                            <th>Descripción</th>
                            <th>Destacado</th>
                            <th>Eliminar<th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="trip : ${trips}">
<td>
    <img th:src="@{/images/{img}(img=${trip.imagen})}" width="100" height="100" />
</td>
                            <td th:text="${trip.id}"></td>
                            <td th:text="${trip.nomTrip}"></td>
                            <td th:text="${#dates.format(trip.fecha, 'dd-MM-yyyy')}"></td>
                            <td th:text="${'$' + trip.costo}"></td>
                            <td th:text="${trip.descripcion}"></td>
                            <td>
                                <span th:if="${trip.destacado == 1}" class="badge bg-success text-uppercase p-2">Si</span>
                                <span th:unless="${trip.destacado == 1}" class="badge bg-danger text-uppercase p-2">No</span>
							<td>
   								 <a th:href="@{/trips/view/{id} (id=${trip.id}) }" class="btn btn-success">Detalle</a>
							</td>
								<td>
  								  <a th:href="@{/trips/delete(id=${trip.id}) }" class="btn btn-danger">Eliminar</a>
									</td>
									</tr>
</table>
