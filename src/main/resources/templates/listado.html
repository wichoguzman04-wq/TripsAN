<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Trips El Salvador | TripApp</title>
    <link th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body class="container mt-5">

    <div class="card">
        <h2 class="card-header d-flex justify-content-between align-items-center">
            Trips en El Salvador
            <a th:href="@{/trips/create}" class="btn btn-primary btn-sm">Nuevo Trip</a>
        </h2>
        
        <div class="card-body">
            
            <div th:if="${msg != null}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${msg}"></span>
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <table class="table table-striped table-hover mt-3">
                <thead class="thead-dark">
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">IMAGEN</th>
                        <th scope="col">DESTINO</th>
                        <th scope="col">FECHA</th>
                        <th scope="col">COSTO</th>
                        <th scope="col">DESTACADO</th>
                        <th scope="col">¿ACTIVO?</th>
                        <th scope="col" class="text-center">ACCIONES</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tempTrip : ${listadoTrips}">
                        <td th:text="${tempTrip?.id}"></td>
                        
                        <td>
                            <img th:src="@{/images/{img} (img=${tempTrip?.imagen != null && tempTrip?.imagen != '' ? tempTrip.imagen : 'no-image.png'})}" 
                                 class="rounded" 
                                 style="max-width: 50px; height: auto;" 
                                 alt="Imagen Destino">
                        </td>
                        
                        <td th:text="${tempTrip?.nomTrip}"></td>
                        
                        <td th:text="${tempTrip?.fecha != null ? #dates.format(tempTrip.fecha, 'dd-MM-yyyy') : 'Sin fecha'}"></td>
                        
                        <td th:text="${'$' + tempTrip?.costo}"></td>
                        
                        <td>
                            <span th:if="${tempTrip?.destacado == 1}" class="badge badge-success">SÍ</span>
                            <span th:if="${tempTrip?.destacado != 1}" class="badge badge-danger">NO</span>
                        </td>
                        
                        <td>
                            <span th:if="${tempTrip?.activo}" class="badge badge-success">Sí</span>
                            <span th:if="${!tempTrip?.activo}" class="badge badge-danger">No</span>
                        </td>
                        
                        <td class="text-center">
                            <a th:href="@{/trips/view/{id} (id=${tempTrip?.id})}" class="btn btn-success btn-sm">Detalle</a>
                            <a th:href="@{/trips/delete (id=${tempTrip?.id})}" class="btn btn-danger btn-sm">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
            
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script th:src="@{/bootstrap/js/bootstrap.min.js}"></script>
</body>
</html>
